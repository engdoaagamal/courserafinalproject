<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBloom - Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-brand">📍 TravelBloom</div>
        <div class="navbar-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active">Contact Us</a>
        </div>
    </nav>

    <!-- Contact Content Section -->
    <section class="info-section" style="margin-top: 40px;">
        <h2>Contact Us</h2>
        <p>Have questions or want a customized itinerary package? Reach out to our customer support desk via the details below or drop us a direct message using the secure mail form.</p>
        <p><strong>Email:</strong> support@travelbloom.com | <strong>Phone:</strong> +1 (555) 019-2834</p>
        
        <!-- Interactive HTML Email Form -->
        <form class="contact-form" action="mailto:support@travelbloom.com" method="post" enctype="text/plain">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Your Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you plan your travel?" required></textarea>
            </div>
            <button type="submit" class="form-btn">Send Email Message</button>
        </form>
    </section>

</body>
</html>
